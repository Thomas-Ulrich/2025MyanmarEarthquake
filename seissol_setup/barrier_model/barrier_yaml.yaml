!Switch

# static_strength, dynamic_strength, tau_0 are not used by seissol
# but added for convenience for the compute_critical_nucleation python function
[T_s, T_d, T_n, mu_d, mu_s, cohesion, static_strength, dynamic_strength, tau_0]: !EvalModel
    parameters: [Ts0, Td0, fault_tag, x, y, z, rake_interp_low_slip, R]
    model: !Switch
        [Ts0, Td0]: !Include 'yaml_files/Ts0Td0.yaml'
        [fault_tag]: !Include 'yaml_files/fault_tags.yaml'
        [rake_interp_low_slip]: !Include 'yaml_files/FL33_34_fault.yaml'
        [x, y, z]: !AffineMap
          matrix:
            x: [1.0, 0.0, 0.0]
            y: [0.0, 1.0, 0.0]
            z: [0.0, 0.0, 1.0]
          translation:
            x: 0.0
            y: 0.0
            z: 0.0
        [R]: !ConstantMap
            map:
              R: 0.95
    components: !LuaMap
      returns: [T_s, T_d, T_n, cohesion, mu_d, mu_s, static_strength, dynamic_strength, tau_0]
      function: |
       function linear_interpolate(x_arr, y_arr, xi)
          if #x_arr ~= #y_arr then
            error("x and y arrays must be same length")
          end
          if xi < x_arr[1] or xi > x_arr[#x_arr] then
            error("xi outside x range")
          end
          for i = 1, #x_arr - 1 do
            if xi >= x_arr[i] and xi <= x_arr[i+1] then
              local t = (xi - x_arr[i]) / (x_arr[i+1] - x_arr[i])
              return y_arr[i] * (1 - t) + y_arr[i+1] * t
            end
          end
          error("xi not in any interval")
       end
       function f (x)
        mu_d = 0.15
        -- ensure R>0.8 in the nucleation region
        xha = { 8375.202415395372, -1877.1157207981212, -10000.0}
        r_crita = 7000.0
        ra = math.sqrt((x['x']-xha[1])^2 + (x['y']-xha[2])^2 + (x['z']-xha[3])^2 )
        coh0 = -250000.0
        cohn = 0.0
        R_south = x["R"]
        R_north = math.min(0.6, R_south)
        local y_values = {-1e8,-5e3, 5e3, 1e8}
        local R_values   = { R_south , R_south, R_north, R_north }
        R = linear_interpolate(y_values, R_values,  x['y'])

        if (ra <= r_crita) then
          coh0 = cohn
        elseif (ra <= r_crita + 1000) then
          xi =  (ra - r_crita)/1000
          coh0 = cohn * xi + (1-xi) * coh0
        end

        -- T_n constant at -40 MPa below ~4km depth (e.g. Suppe, 2014)
        T_n = math.min(-10^6, math.max(-16e6, 0.4*2700*9.8*x['z']))
        -- T_n = math.min(-10^6, 0.15*2700*9.8*x['z'])
        sigma_n = math.abs(T_n)

        depthIncreasingCohesion = 2000.0
        cohesion = coh0  -1000000.0 * math.max(0, (x['z'] + depthIncreasingCohesion) / depthIncreasingCohesion)

        T_s = math.cos(x['rake_interp_low_slip']) * mu_d * sigma_n - 0.95 * x['Ts0']
        T_d = math.sin(x['rake_interp_low_slip']) * mu_d * sigma_n - 0.95 * x['Td0']
        Tau0 =  math.sqrt(T_s^2 + T_d^2)
        mu_smax = 0.75
        Tau0_max = sigma_n * ( mu_d + (mu_smax - mu_d - 0 * cohesion/sigma_n) * R)
        if (Tau0 > Tau0_max) then
          T_s = T_s * Tau0_max/Tau0
          T_d = T_d * Tau0_max/Tau0
          Tau0 =  math.sqrt(T_s^2 + T_d^2)
        end
        mu_delta_min = 0.2
        mu_s =  mu_d + math.max(mu_delta_min, (Tau0/sigma_n - mu_d)/R + 0 * cohesion/sigma_n)
 
        if x['z'] < -3000 and x['y'] < -242.8e3 and x['y'] > -244.8e3 then
          
          mu_s = mu_s + 2.0
        end

        return {
          T_s = T_s,
          T_d = T_d,
          T_n = T_n,
          cohesion = cohesion,
          mu_d = mu_d,
          mu_s = mu_s,
          dynamic_strength = - mu_d * T_n - cohesion,
          static_strength = - mu_s * T_n - cohesion,  
          tau_0 = Tau0
        }
        end


[Tnuc_n, Tnuc_s, Tnuc_d]: !ConstantMap
  map:
    Tnuc_n: 0
    Tnuc_s: 0
    Tnuc_d: 0

[d_c]: !EvalModel
    parameters: [fault_slip, x, y, z]
    model: !Switch
        [fault_slip]: !Include 'yaml_files/fault_slip.yaml'
        [x, y, z]: !AffineMap
          matrix:
            x: [1.0, 0.0, 0.0]
            y: [0.0, 1.0, 0.0]
            z: [0.0, 0.0, 1.0]
          translation:
            x: 0.0
            y: 0.0
            z: 0.0
    components: !LuaMap
      returns: [d_c]
      function: |
       function linear_interpolate(x_arr, y_arr, xi)
          if #x_arr ~= #y_arr then
            error("x and y arrays must be same length")
          end
          if xi < x_arr[1] or xi > x_arr[#x_arr] then
            error("xi outside x range")
          end
          for i = 1, #x_arr - 1 do
            if xi >= x_arr[i] and xi <= x_arr[i+1] then
              local t = (xi - x_arr[i]) / (x_arr[i+1] - x_arr[i])
              return y_arr[i] * (1 - t) + y_arr[i+1] * t
            end
          end
          error("xi not in any interval")
       end

       function f (x)

       d_c =  0.15 * math.max(0.6923825144767761, x["fault_slip"])
       d_c025 =  0.25 * math.max(0.8307437896728516, x["fault_slip"])
       local y_values = {-1e8,-5e3, 5e3, 1e8}
       alpha_ref = 0
       alpha_extra = 1
       local alpha_values   = { alpha_ref , alpha_ref, alpha_ref + alpha_extra, alpha_ref + alpha_extra }
       alpha = linear_interpolate(y_values, alpha_values,  x['y'])
       d_c = (1-alpha) * d_c + alpha * math.max(d_c025, d_c)

       if x['z'] < -3000 and x['y'] < -242.8e3 and x['y'] > -244.8e3 then
       
         d_c = d_c + 20.0

       end 

        return {
          d_c =  d_c
        }
        end

[forced_rupture_time]: !LuaMap
  returns: [forced_rupture_time]
  function: |
      function f (x)
        xha = { 8375.202415395372, -1877.1157207981212, -10000.0}
        r_crita = 7000.0
        ra = math.sqrt((x["x"]-xha[1])^2 + (x["y"]-xha[2])^2 + (x["z"]-xha[3])^2 )
        Vs = 3464.0
        if (ra <= r_crita) then
          forced_rupture_time = ra/(0.7*Vs)+(0.081*r_crita/(0.7*Vs))*(1.0/(1.0-(ra/r_crita)^2)-1.0)
        else
          forced_rupture_time = 1000000000.0
        end
        return {
          forced_rupture_time = forced_rupture_time
        }
      end
